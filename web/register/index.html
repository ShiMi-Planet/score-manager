<!DOCTYPE html>
<html lang="zh">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0, minimal-ui">
  <title>注册 - 个人成绩管理系统</title>
  <link rel="shortcut icon" type="image/x-icon" href="../images/favicon.png">
  <link rel="shortcut icon" href="../images/favicon.png" type="image/x-icon">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="stylesheet" type="text/css" href="../css/materialdesignicons.min.css">
  <link rel="stylesheet" type="text/css" href="../css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="../css/animate.min.css">
  <link rel="stylesheet" type="text/css" href="../css/style.min.css">
  <link rel="stylesheet" type="text/css" href="../js/jquery-confirm/jquery-confirm.min.css">
  <style>
  </style>
</head>

<body class="bg-white overflow-x-hidden">
  <div class="row bg-white vh-100">
    <div class="col-md-6 col-lg-7 col-xl-8 d-none d-md-block"
      style="background-image: url(../images/login-bg.jpg); background-size: cover;">

      <div class="d-flex vh-100">
        <div class="p-5 align-self-start">
          <img src="../images/banner.png" style="width: 35%;">
          <br><br><br>
          <p class="text-dark">个人成绩管理系统是由<a target="_blank"
              href="https://github.com/ShiMi-Planet">柿米星球</a>团队为学生提供的本地化成绩管理服务系统</p>
        </div>
      </div>
    </div>

    <div class="col-md-6 col-lg-5 col-xl-4 align-self-center">
      <div class="p-5">
        <div class="text-center">
          <a href="./index.html"> <img alt="light year admin" src="../images/banner.png" style="width: 50%;"> </a>
        </div>
        <p class="text-center text-muted"><small>请输入您的希望创建的账号和密码</small></p>
        <form class="signin-form needs-validation" novalidate>
          <div class="mb-3">
            <label for="username">用户名</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="请输入您的用户名" required>
          </div>

          <div class="mb-3">
            <label for="password">密码</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="请输入您的密码" required>
          </div>

          <div class="mb-3 d-grid">
            <button class="btn btn-primary" type="submit" id="register">注册账号</button>
          </div>
        </form>
        <a href="../login/" target="_self" class="float-end">返回登录</a>
        <p class="copyright">
          <span>Copyright &copy; 2024. </span>
          <a target="_blank" href="https://github.com/ShiMi-Planet">柿米星球</a>
          <span> All rights reserved.</span>
        </p>
      </div>
    </div>
  </div>
  <script type="text/javascript" src="../js/jquery.min.js"></script>
  <script type="text/javascript" src="../js/popper.min.js"></script>
  <script type="text/javascript" src="../js/bootstrap.min.js"></script>
  <script type="text/javascript" src="../js/lyear-loading.js"></script>
  <script type="text/javascript" src="../js/bootstrap-notify.min.js"></script>
  <script type="text/javascript" src="../js/jquery-confirm/jquery-confirm.min.js"></script>
  <script src="../config.js"></script>
  <script src="../settings.js"></script>
  <script src="./index.js"></script>

</body>

</html>
